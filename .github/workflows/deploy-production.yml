name: Build & Validate

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @artistico/shared build

      - name: Build functions
        run: pnpm --filter @artistico/functions build

      # App Hosting auto-deploys on push to main via Cloud Build.
      # No manual Firebase Hosting deploy step needed.
