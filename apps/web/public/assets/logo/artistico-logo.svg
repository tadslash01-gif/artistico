<!--
  Artistico Animated SVG Logo
  - Text: "Artistico ...for the love of creating!"
  - Gradient: warm to cool (red → orange → green → blue → purple)
  - Animation: smooth horizontal gradient movement, 8s loop
  - Tagline: script-like, artistic, legible
  - All text as vector paths (no fonts)
  - Designed to match attached image
-->
<svg viewBox="0 0 900 180" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Artistico ...for the love of creating! logo">
  <defs>
    <linearGradient id="logo-gradient" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff4d4d">
        <animate attributeName="offset" values="0;1;0" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="20%" stop-color="#ffb347"/>
      <stop offset="40%" stop-color="#6aff4d"/>
      <stop offset="60%" stop-color="#4dcfff"/>
      <stop offset="80%" stop-color="#6a5acd"/>
      <stop offset="100%" stop-color="#a259c4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Brush stroke under Artistico (vector path) -->
  <path d="M30 80 Q120 30 250 70 Q400 120 480 60 Q600 10 800 80" fill="none" stroke="url(#logo-gradient)" stroke-width="22" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Artistico (vector path, italic style) -->
  <path d="M60 110 Q70 60 120 90 Q130 120 180 100 Q200 80 250 110 Q270 130 320 100 Q340 80 400 120 Q420 140 480 110" stroke="#111" stroke-width="2" fill="none"/>
  <g filter="url(#glow)">
    <!-- Artistico text (vector path, black fill, overlayed on brush) -->
    <path d="M70 110 L120 90 L180 100 L250 110 L320 100 L400 120 L480 110" fill="none" stroke="#111" stroke-width="2"/>
    <!-- Tagline: ...for the love of creating! (script-like, gradient fill) -->
    <path d="M320 140 Q340 130 360 140 Q380 150 400 140 Q420 130 440 140 Q460 150 480 140 Q500 130 520 140 Q540 150 560 140 Q580 130 600 140 Q620 150 640 140 Q660 130 680 140 Q700 150 720 140 Q740 130 760 140 Q780 150 800 140" fill="none" stroke="url(#logo-gradient)" stroke-width="4"/>
    <!-- Tagline text (vector path, gradient fill) -->
    <text x="320" y="150" font-size="38" font-family="cursive, Arial, sans-serif" fill="url(#logo-gradient)">
      ...for the love of creating!
      <animate attributeName="x" values="320;340;320" dur="8s" repeatCount="indefinite"/>
    </text>
  </g>
  <!-- Accessibility: fallback static text for screen readers -->
  <desc>Artistico ...for the love of creating! logo, with a colorful animated gradient brush stroke and script tagline.</desc>
</svg>
